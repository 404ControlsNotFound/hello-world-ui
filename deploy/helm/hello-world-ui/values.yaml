replicaCount: 2

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/404controlsnotfound/hello-world-ui
  tag: "latest"
  pullPolicy: IfNotPresent

rollout:
  enabled: false
  revisionHistoryLimit: 2
  autoPromotionEnabled: true
  autoPromotionSeconds: 30
  previewReplicaCount: 1
  scaleDownDelaySeconds: 30

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 101

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80

containerPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: hello-world.localtest.me
      paths:
        - path: /
          pathType: Prefix
  tls: []
  preview:
    enabled: false
    annotations: {}
    hosts:
      - host: preview-hello-world.localtest.me
        paths:
          - path: /
            pathType: Prefix
    tls: []

networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  denyAllEgress: true

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  path: /
  initialDelaySeconds: 3
  periodSeconds: 10
