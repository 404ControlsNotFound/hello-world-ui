name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  scan-build-and-promote:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> "${GITHUB_ENV}"

      - name: Set image repository
        run: |
          echo "IMAGE_NAME=$(echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/hello-world-ui" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_ENV}"

      - name: Source code scan
        run: |
          docker run --rm \
            -v "${PWD}:/src" \
            returntocorp/semgrep:latest \
            semgrep scan --config auto --error /src

      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION="${IMAGE_TAG}" \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" \
            .

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@e6c2c5e321ed9123bda567646e2f96565e34abe1
        with:
          version: v0.69.1
          cache: true

      - name: Image scan
        run: |
          trivy image --debug \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --vuln-type os,library \
            --exit-code 1 \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:latest"

      - name: Promote image tag in gitops-infra
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITOPS_REPO: ${{ vars.GITOPS_REPO }}
          GITOPS_VALUES_FILE: ${{ vars.GITOPS_VALUES_FILE }}
          GITOPS_REPO_TOKEN: ${{ secrets.GITOPS_REPO_TOKEN }}
        run: |
          if [ -z "${GITOPS_REPO}" ] || [ -z "${GITOPS_VALUES_FILE}" ] || [ -z "${GITOPS_REPO_TOKEN}" ]; then
            echo "GitOps promotion is not configured; skipping."
            exit 0
          fi

          git clone "https://x-access-token:${GITOPS_REPO_TOKEN}@github.com/${GITOPS_REPO}.git" gitops-infra
          cd gitops-infra

          sed -i "s|tag: .*|tag: \"${IMAGE_TAG}\"|" "${GITOPS_VALUES_FILE}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No GitOps change detected."
            exit 0
          fi

          git add "${GITOPS_VALUES_FILE}"
          git commit -m "chore: promote hello-world-ui image ${IMAGE_TAG}"
          git push origin HEAD:main
